
services:
  app:
    build: .
    container_name: portfolio_app

    command: >
      sh -c "
      sleep 5 &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

    ports:
      - "8000:8000"

    depends_on:
      - db
      - redis

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/portfolio_risk
      REDIS_URL: redis://redis:6379/0

    env_file:
      - .env

    volumes:
      - .:/app

  db:
    image: postgres:15
    container_name: portfolio_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_risk

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: portfolio_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data:

