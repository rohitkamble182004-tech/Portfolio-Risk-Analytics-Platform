services:
  db_test:
    image: postgres:16-alpine
    container_name: portfolio_db_test
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  app_test:
    build: .
    container_name: portfolio_app_test
    depends_on:
      db_test:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://test:test@db_test:5432/testdb
    command: >
      pytest -v
    volumes:
      - .:/app

volumes:
  test_postgres_data: